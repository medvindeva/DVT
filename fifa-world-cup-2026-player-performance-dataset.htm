    <script nonce="eQDL3DromwtWnN3ZPk8RiA==" type="application/ld+json">{"@context":"http://schema.org/","@type":"Dataset","name":"FIFA World Cup 2026 Player Performance Dataset","description":"# FIFA World Cup 2026 Player Performance Dataset\n\nThe FIFA World Cup 2026 Player Performance Dataset is a comprehensive collection of player statistics, match events, and performance metrics gathered throughout the tournament. Designed for sports analytics, machine learning, data visualization, and football research, this dataset provides detailed insights into individual and team performances across all stages of the competition.\n\nThe dataset includes player attributes, match participation records, goals, assists, shots, passing accuracy, defensive actions, goalkeeper statistics, disciplinary records, physical performance indicators, and advanced analytical metrics. It enables users to evaluate player effectiveness, compare athletes across positions, identify emerging talents, and analyze tactical trends during the tournament.\n\nResearchers, data scientists, football analysts, students, and sports enthusiasts can use this dataset to build predictive models, create interactive dashboards, perform statistical analysis, and explore performance patterns at both player and team levels. The dataset is suitable for applications such as player rating systems, match outcome prediction, scouting analysis, team strategy evaluation, and AI-powered football intelligence systems.\n\n### Example Features\n\n* Player ID\n* Player Name\n* National Team\n* Position\n* Age\n* Height\n* Weight\n* Matches Played\n* Minutes Played\n* Goals\n* Assists\n* Shots\n* Shots on Target\n* Passes Completed\n* Pass Accuracy (%)\n* Key Passes\n* Dribbles Completed\n* Tackles\n* Interceptions\n* Clearances\n* Saves (Goalkeepers)\n* Clean Sheets\n* Yellow Cards\n* Red Cards\n* Expected Goals (xG)\n* Expected Assists (xA)\n* Distance Covered\n* Sprint Count\n* Player Rating\n\n### Potential Use Cases\n\n* Football Performance Analysis\n* Sports Data Science Projects\n* Machine Learning and AI Research\n* Predictive Analytics\n* Player Scouting Systems\n* Team Performance Evaluation\n* Data Visualization Dashboards\n* Sports Business Intelligence\n* Educational and Academic Research\n* FIFA World Cup Historical Analysis\n\nThis dataset offers a valuable foundation for understanding player performance dynamics during the FIFA World Cup 2026 and supports advanced analytical exploration of one of the world's most prestigious sporting events.\n","url":"https://www.kaggle.com/rauffauzanrambe/fifa-world-cup-2026-player-performance-dataset","version":1,"keywords":["task, classification","technique, data analytics","subject, health and fitness, exercise, sports","technique, data visualization","subject, science and technology, computer science, artificial intelligence"],"license":{"@type":"CreativeWork","name":"MIT","url":"https://www.mit.edu/~amini/LICENSE.md"},"identifier":["10709354"],"includedInDataCatalog":{"@type":"DataCatalog","name":"Kaggle","url":"https://www.kaggle.com"},"creator":{"@type":"Person","name":"Ra'uf Fauzan Rambe","url":"https://www.kaggle.com/rauffauzanrambe","image":"https://storage.googleapis.com/kaggle-avatars/thumbnails/31589109-kg.png?t=2026-01-18-04-00-38"},"distribution":[{"@type":"DataDownload","requiresSubscription":true,"encodingFormat":"zip","fileFormat":"zip","contentUrl":"https://www.kaggle.com/datasets/rauffauzanrambe/fifa-world-cup-2026-player-performance-dataset/download?datasetVersionNumber=1","contentSize":"4154062 bytes"}],"commentCount":2,"dateModified":"2026-06-10T12:58:47.093Z","discussionUrl":"https://www.kaggle.com/rauffauzanrambe/fifa-world-cup-2026-player-performance-dataset/discussion","alternateName":"Comprehensive Statistics and Advanced Metrics for World Cup Player Analysis","isAccessibleForFree":true,"thumbnailUrl":"https://storage.googleapis.com/kaggle-datasets-images/10709354/16728693/2b2fea73552e4990f03bd72af1f91eb4/da
